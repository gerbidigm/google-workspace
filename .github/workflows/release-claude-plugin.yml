name: Release Claude Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release-claude-plugin:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build --workspace=workspace-server

      - name: Create Claude plugin release asset
        run: node scripts/release-claude-plugin.js --platform=${{ matrix.platform }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/release-upload
        with:
          files: release/${{ matrix.platform }}.google-workspace-claude-plugin.tar.gz
